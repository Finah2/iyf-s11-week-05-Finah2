<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Task Manager — Finah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            color: #39ff14;
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        /* Form */
        #todo-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        #todo-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s;
        }

        #todo-input:focus {
            outline: none;
            border-color: #39ff14;
        }

        #todo-input::placeholder { color: #444; }

        #todo-form button {
            padding: 0.75rem 1.5rem;
            background: #39ff14;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        #todo-form button:hover {
            background: #28b30e;
            transform: translateY(-1px);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .filter {
            padding: 0.4rem 1rem;
            border: 1px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .filter:hover { border-color: #39ff14; color: #39ff14; }
        .filter.active { background: #39ff14; color: #1a1a2e; border-color: #39ff14; font-weight: 600; }

        /* Todo list */
        #todo-list {
            list-style: none;
            margin-bottom: 1.5rem;
            min-height: 100px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 1rem;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border: 1px solid #222;
            transition: border-color 0.3s, transform 0.2s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            border-color: #39ff14;
            transform: translateX(3px);
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #444;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #39ff14;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .todo-item.completed .todo-checkbox {
            background: #39ff14;
            color: #1a1a2e;
            font-size: 0.75rem;
        }

        .todo-text {
            flex: 1;
            color: #ddd;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .todo-text:hover { color: #fff; }

        .todo-edit-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid #39ff14;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Open Sans', sans-serif;
            outline: none;
            padding: 0.2rem 0;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: #444;
            padding: 2rem;
            font-size: 0.9rem;
        }

        .empty-state .emoji { font-size: 2rem; margin-bottom: 0.5rem; }

        /* Stats */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #222;
        }

        #items-left { color: #666; font-size: 0.85rem; }

        #clear-completed {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        #clear-completed:hover { color: #e74c3c; }

        /* Priority badges */
        .priority {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
        }

        .priority-high { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .priority-medium { background: rgba(243,156,18,0.2); color: #f39c12; }
        .priority-low { background: rgba(57,255,20,0.2); color: #39ff14; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 School Tasks</h1>
    <p class="subtitle">Stay on top of your assignments, Finah!</p>

    <form id="todo-form">
        <input type="text" id="todo-input" placeholder="Add a new task... e.g. Study for physics test" required>
        <button type="submit">Add</button>
    </form>

    <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="stats">
        <span id="items-left">0 items left</span>
        <button id="clear-completed">Clear Completed</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
